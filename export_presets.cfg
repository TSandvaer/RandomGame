html/custom_html_shell=""
; HTML5 head_include — two scripts injected into <head> at export time:
;   1) Suppress browser right-click context menu (PR #235, hardened in the
;      html5-contextmenu-suppress fix). RMB is the in-game heavy-attack bind;
;      the browser's native contextmenu must never fire over the game.
;      Hardening over the original PR #235 form: the document-level
;      preventDefault is registered SYNCHRONOUSLY at <head>-parse time (the
;      original deferred BOTH listeners to DOMContentLoaded, leaving a
;      head-parse -> DCL window with no suppressor — a real-browser cold-load
;      right-click could leak the menu before DCL fired). Registered on
;      `window` capture (earliest point in the entire capture descent — before
;      document), PLUS document capture and bubble phases, so it catches the
;      event on the way down regardless of target (canvas, body/letterbox
;      margins) and before any handler that might stopPropagation between
;      window and document; a canvas-specific capture listener is re-added on
;      DCL as belt-and-suspenders. The window-capture listener is the Shift+RMB
;      hardening (Sponsor re-soak #5, Brave): the heavy-attack combo is
;      Shift+RMB; empirically Shift+RMB DOES fire the `contextmenu` event in
;      Brave (verified against the real Brave binary via CDP — both plain and
;      shift right-click reach the suppressor and end defaultPrevented), so
;      there is NO modifier gate to remove — the fix is to register the
;      preventDefault at the earliest possible capture point so nothing can
;      intercept the shift-modified event first. Godot's own engine glue also installs a
;      canvas contextmenu preventDefault, but it attaches only after the WASM
;      Display driver boots — this head_include covers the pre-boot window too.
;   2) ?debug=1 URL-param Copy-log overlay (Sponsor M2 W3 soak workaround
;      for the ~50KB F12 console copy-paste truncation; uses
;      navigator.clipboard.writeText on the in-memory log buffer).
;      Buffer intercepts console.log/warn/error/info. No GDScript changes.
;      Desktop builds unaffected. Without `?debug=1`, the overlay does not
;      attach and the script returns immediately — zero runtime impact on
;      normal play.
;      CHUNKED COPY (tess/chunked-log-copy): the full buffer routinely
;      exceeds the ~50KB chat-paste cap, truncating the diagnostic tail.
;      The overlay copies in sequential line-boundary chunks each
;      <= SAFE_CHUNK_CAP (40000 chars, under the 50000 chat limit). The
;      main button label shows `Copy log (chunk X/N)` and advances+wraps on
;      each click; a second `Tail` button copies the last <=cap chars (the
;      diagnostic tail). Each copied chunk is prefixed with a self-labeling
;      `=== log chunk X/N (build <sha>) ===` header for reassembly. The pure
;      chunking helpers (chunkLines / tailLines / header / SAFE_CHUNK_CAP)
;      are exposed on `window.__embergraveCopyLog` for Playwright unit tests.
; ESCAPE-SEQUENCE WARNING: Godot's INI parser interprets backslash escapes
; in string values before writing them into the generated index.html. A
; literal `\n` in this string becomes a real newline character at export
; time, which splits any JS string literal containing it across two lines
; and produces a SyntaxError that crashes the whole IIFE. Escape every
; intended-for-JS `\n` as `\\n` (and similarly `\\t`, `\\r`, `\\\\`, etc.).
; Verify after any edit: `grep "buf.join" build/web/index.html` should show
; the call on a SINGLE LINE.
html/head_include="<script>(function(){var block=function(e){e.preventDefault();};window.addEventListener('contextmenu',block,true);document.addEventListener('contextmenu',block,true);document.addEventListener('contextmenu',block,false);document.addEventListener('DOMContentLoaded',function(){var canvas=document.getElementById('canvas');if(canvas){canvas.addEventListener('contextmenu',block,true);}});})();</script><script>(function(){var p=new URLSearchParams(window.location.search);if(p.get('debug')!=='1')return;var buf=[];var MAX=20000;var SAFE_CHUNK_CAP=40000;function push(kind,args){try{var s='['+kind+'] '+Array.prototype.map.call(args,function(a){if(a===null)return'null';if(a===undefined)return'undefined';if(typeof a==='string')return a;try{return JSON.stringify(a);}catch(e){return String(a);}}).join(' ');buf.push(s);if(buf.length>MAX)buf.splice(0,buf.length-MAX);}catch(e){}}var L=console.log,W=console.warn,E=console.error,I=console.info;console.log=function(){push('log',arguments);return L.apply(console,arguments);};console.warn=function(){push('warn',arguments);return W.apply(console,arguments);};console.error=function(){push('error',arguments);return E.apply(console,arguments);};console.info=function(){push('info',arguments);return I.apply(console,arguments);};function buildSha(){for(var i=buf.length-1;i>=0;i--){var m=buf[i].match(/\\[BuildInfo\\]\\s+build:\\s+(\\S+)/);if(m)return m[1];}return 'unknown';}function chunkLines(lines,cap){var chunks=[];var cur=[];var curLen=0;for(var i=0;i<lines.length;i++){var ln=lines[i];var projected=(cur.length===0)?ln.length:(curLen+1+ln.length);if(cur.length>0&&projected>cap){chunks.push(cur);cur=[];curLen=0;projected=ln.length;}cur.push(ln);curLen=projected;}if(cur.length>0)chunks.push(cur);return chunks;}function tailLines(lines,cap){var out=[];var len=0;for(var i=lines.length-1;i>=0;i--){var ln=lines[i];var projected=(out.length===0)?ln.length:(len+1+ln.length);if(out.length>0&&projected>cap)break;out.unshift(ln);len=projected;}return out;}function header(idx,total,sha){return '=== log chunk '+idx+'/'+total+' (build '+sha+') ===';}window.__embergraveCopyLog={SAFE_CHUNK_CAP:SAFE_CHUNK_CAP,chunkLines:chunkLines,tailLines:tailLines,header:header,buffer:function(){return buf.slice();}};window.addEventListener('DOMContentLoaded',function(){var chunkIdx=0;function writeClip(text,onOk,onFail){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(onOk).catch(onFail);}else{try{var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();var success=document.execCommand('copy');document.body.removeChild(ta);if(success)onOk();else onFail(new Error('execCommand copy returned false'));}catch(e){onFail(e);}}}function style(btn,bottom){var s=btn.style;s.position='fixed';s.bottom=bottom;s.right='8px';s.zIndex='99999';s.padding='6px 12px';s.background='#222';s.color='#eee';s.border='1px solid #555';s.borderRadius='4px';s.font='12px monospace';s.cursor='pointer';s.opacity='0.85';btn.addEventListener('mouseenter',function(){s.opacity='1';});btn.addEventListener('mouseleave',function(){s.opacity='0.85';});}var btn=document.createElement('button');btn.id='embergrave-debug-copy-log';btn.setAttribute('aria-label','Copy debug log in chat-pasteable chunks');style(btn,'8px');function labelFor(total){if(total<=0)return 'Copy log (chunk 0/0)';return 'Copy log (chunk '+(chunkIdx+1)+'/'+total+')';}function refreshLabel(){btn.textContent=labelFor(chunkLines(buf,SAFE_CHUNK_CAP).length);}refreshLabel();btn.addEventListener('click',function(){var chunks=chunkLines(buf,SAFE_CHUNK_CAP);var total=chunks.length;if(total===0){btn.textContent='Copy log (empty)';setTimeout(refreshLabel,1500);return;}if(chunkIdx>=total)chunkIdx=0;var idx=chunkIdx;var body=chunks[idx].join('\\n');var text=header(idx+1,total,buildSha())+'\\n'+body;function ok(){btn.textContent='Copied chunk '+(idx+1)+'/'+total+' ('+text.length+' ch)';chunkIdx=(idx+1)%total;setTimeout(refreshLabel,1600);}function fail(err){btn.textContent='Copy failed';E.call(console,'[debug copy-log] clipboard write failed:',err);setTimeout(refreshLabel,2000);}writeClip(text,ok,fail);});document.body.appendChild(btn);var tbtn=document.createElement('button');tbtn.id='embergrave-debug-copy-tail';tbtn.textContent='Tail';tbtn.setAttribute('aria-label','Copy the last chat-pasteable chunk (diagnostic tail)');style(tbtn,'40px');tbtn.addEventListener('click',function(){var tail=tailLines(buf,SAFE_CHUNK_CAP);if(tail.length===0){tbtn.textContent='Tail (empty)';setTimeout(function(){tbtn.textContent='Tail';},1500);return;}var chunks=chunkLines(buf,SAFE_CHUNK_CAP);var total=chunks.length;var text=header(total,total,buildSha())+' [TAIL]\\n'+tail.join('\\n');function ok(){tbtn.textContent='Tail copied ('+text.length+' ch)';setTimeout(function(){tbtn.textContent='Tail';},1600);}function fail(err){tbtn.textContent='Tail failed';E.call(console,'[debug copy-log] tail clipboard write failed:',err);setTimeout(function(){tbtn.textContent='Tail';},2000);}writeClip(text,ok,fail);});document.body.appendChild(tbtn);L.call(console,'[debug copy-log] chunked overlay attached (?debug=1, cap='+SAFE_CHUNK_CAP+')');});})();</script>"
