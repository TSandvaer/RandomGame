; BB-1 fix — `export_filter="all_resources"` only packs Godot-imported
; resources, so plain text files at the project root are dropped from the
; .pck. `build_info.txt` (CI-stamped, gitignored) is read at runtime by
; `scripts/debug/BuildInfo.gd` from `res://build_info.txt`; without this
