; Embergrave export presets — committed to VCS as the contract between
; the project and CI release workflows. See:
;   - .github/workflows/release-github.yml  (Devon, M1 RC build)
;   - .github/workflows/release-itch.yml    (Devon, full multi-platform itch deploy)
;
; Preset names are load-bearing — the workflow matrices reference them by
; exact string. If you rename a preset, update the workflows in lockstep.
;
; Authored by hand for Godot 4.3 — Godot's editor will prefer to write this
; file itself, but a hand-authored minimal set is sufficient for headless
; `godot --export-release "<preset name>" <path>` invocations in CI.

