name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Pin once. Bump in lockstep across this workflow, addons/gut/README.md,
# and .github/workflows/release-itch.yml.
env:
  GODOT_VERSION: "4.3"
  GODOT_STATUS: "stable"
  GUT_VERSION: "v9.3.0"

permissions:
  contents: read

jobs:
  import-and-test:
    name: Headless import + GUT
    runs-on: ubuntu-22.04
    # barichello/godot-ci packages a Godot binary at the requested version,
    # plus the export templates we need for the release workflow. We only use
    # the runtime here.
    container:
      image: barichello/godot-ci:4.3
    # The barichello/godot-ci container's default shell is `sh -e`, which
    # does not understand `set -o pipefail` and exits 2 immediately on any
    # `run:` step that uses it. Force bash for every step so pipefail and
    # other bashisms work. (Tess fix, 2026-05-02 — CI red since first push.)
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GUT lives outside this repo (decision: not vendored). Shallow
          # clone is fine because we don't need history for CI.
          fetch-depth: 1

      - name: Show Godot version
        run: godot --version

      - name: Install GUT (pinned)
        run: |
          set -euo pipefail
          # The bitwes/Gut repo is itself a Godot project — the actual addon
          # lives at `addons/gut/` inside that repo. Clone to a temp dir, then
          # move the inner `addons/gut/` to our `addons/gut/`. (Tess fix
          # 2026-05-02 — previously cloned the whole repo to addons/gut/,
          # which left gut_cmdln.gd at addons/gut/addons/gut/gut_cmdln.gd.)
          rm -rf addons/gut /tmp/gut-src
          git clone --depth 1 --branch "${GUT_VERSION}" https://github.com/bitwes/Gut.git /tmp/gut-src
          mkdir -p addons
          mv /tmp/gut-src/addons/gut addons/gut
          ls addons/gut/gut_cmdln.gd

      - name: Stamp build SHA into project
        run: |
          set -euo pipefail
          # Devon hook 1 — write the short git SHA to build_info.txt so the
          # BuildInfo autoload renders it as the "build: abcdef1" footer.
          # Tess m1-test-plan section "Build identification" requires every test
          # run to record the SHA. ${GITHUB_SHA:0:7} is the 7-char short
          # form Git uses by default. The same step lives in release-itch.yml
          # so HTML5 / native exports also stamp the SHA.
          short_sha="${GITHUB_SHA:0:7}"
          echo -n "${short_sha}" > build_info.txt
          echo "Stamped build_info.txt = ${short_sha}"

      - name: Headless import (asset import sanity)
        run: |
          set -euo pipefail
          # `--import` exits 0 if the project loads & all assets import cleanly.
          # `--headless` is required on the CI image (no display).
          # `--quit-after 200` guards against import hangs.
          godot --headless --import --quit-after 200
          # Confirm the import cache materialised.
          test -d .godot

      - name: Run GUT tests
        run: |
          set -euo pipefail
          # `-gexit` makes GUT exit with non-zero on test failures, so the
          # CI step fails accordingly. `-gdir=res://tests` discovers any
          # test_*.gd files. If the tests/ folder has only the .gdkeep file
          # GUT exits 0 with "no tests found" — that's fine for week 1.
          godot --headless \
                -s addons/gut/gut_cmdln.gd \
                -gdir=res://tests \
                -ginclude_subdirs \
                -gexit
