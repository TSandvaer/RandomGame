name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Pin once. Bump in lockstep across this workflow, addons/gut/README.md,
# and .github/workflows/release-itch.yml.
env:
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: "stable"
  # GUT v9.3.0 does NOT load under Godot 4.6 — its `class_name Logger`
  # (addons/gut/utils.gd) shadows Godot 4.6's new native `Logger` class,
  # a hard parse error that cascades through the whole addon. Fix landed
  # in GUT 9.4.0; full 4.6 compat in 9.6.0 (86ca65gyv migration).
  GUT_VERSION: "v9.6.0"

permissions:
  contents: read

# Devon ci-hardening 2026-05-02 — cancel an in-flight CI run on the same
# branch / PR when a new commit lands. The dominant cost in this workflow
# is the ~85 s container pull on `Initialize containers`; a rapid-fire
# push series (typo, typo-fix, ...) used to queue every commit. With
# cancel-in-progress only the latest commit on a branch holds the runner.
# `main` is excluded from cancellation so a push-to-main run is never
# cancelled by a follow-up PR run; PR runs against different branches do
# not collide because the group is keyed on github.ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  import-and-test:
    name: Headless import + GUT
    runs-on: ubuntu-22.04
    # Devon ci-hardening follow-up 2026-05-02 — workflow-level safety net.
    # Recent baseline is ~1m20s; 10 minutes is plenty of headroom for a
    # hung Godot import (deadlocked autoload _ready, infinite recursion in
    # a TRES) or a runaway test runner without burning Actions minutes
    # indefinitely. If we ever cross this, that's a signal to investigate
    # rather than to bump the cap. See team/devon-dev/ci-hardening.md.
    timeout-minutes: 10
    # barichello/godot-ci packages a Godot binary at the requested version,
    # plus the export templates we need for the release workflow. We only use
    # the runtime here.
    container:
      image: barichello/godot-ci:4.6.3
    # The barichello/godot-ci container's default shell is `sh -e`, which
    # does not understand `set -o pipefail` and exits 2 immediately on any
    # `run:` step that uses it. Force bash for every step so pipefail and
    # other bashisms work. (Tess fix, 2026-05-02 — CI red since first push.)
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # GUT lives outside this repo (decision: not vendored). Shallow
          # clone is fine because we don't need history for CI.
          fetch-depth: 1

      - name: Show Godot version
        run: godot --version

      # Devon ci-hardening 2026-05-02 — cache the Godot asset-import
      # database (`.godot/`) between runs so the second-and-onward run
      # skips re-importing every scene/texture/.tres. The miss path is
      # identical to the no-cache flow — `godot --headless --import`
      # rebuilds `.godot/` from scratch — so there is no second code path
      # to maintain. The key is the hash of every file Godot treats as
      # importable input plus the Godot version pin: any meaningful
      # content change invalidates the cache and we re-import (correctness
      # over speed). GUT_VERSION is included because changing the GUT pin
      # can introduce new importables under addons/gut/. The restore-key
      # falls back to the most recent cache for this Godot+GUT pair so a
      # cold cache after a small content-only edit still gets a partial
      # warm start.
      - name: Cache Godot import (.godot)
        id: cache-godot-import
        uses: actions/cache@v4
        with:
          path: .godot
          key: godot-import-${{ env.GODOT_VERSION }}-${{ env.GUT_VERSION }}-${{ hashFiles('project.godot', '**/*.tscn', '**/*.tres', '**/*.gd', '**/*.png', '**/*.svg', '**/*.ttf') }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-${{ env.GUT_VERSION }}-

      # Devon ci-hardening follow-up 2026-05-02 — cache the GUT addon
      # checkout keyed on GUT_VERSION (workflow env). Bumping the pin at
      # the top of this file invalidates the cache automatically. On a
      # warm hit the entire `Install GUT (pinned)` step below is skipped
      # (its `if:` guard checks this step's cache-hit output) — saving
      # the 5-10 s git-clone path. The retry-with-backoff still covers
      # the cold path. Cache miss path is identical to the no-cache flow.
      # See team/devon-dev/ci-hardening.md.
      - name: Cache GUT addon
        id: cache-gut
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}-v1

      - name: Install GUT (pinned)
        if: steps.cache-gut.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # The bitwes/Gut repo is itself a Godot project — the actual addon
          # lives at `addons/gut/` inside that repo. Clone to a temp dir, then
          # move the inner `addons/gut/` to our `addons/gut/`. (Tess fix
          # 2026-05-02 — previously cloned the whole repo to addons/gut/,
          # which left gut_cmdln.gd at addons/gut/addons/gut/gut_cmdln.gd.)
          # Devon ci-hardening 2026-05-02 — wrap the clone in a 3-attempt
          # retry to absorb transient github.com network blips
          # (intermittent ECONNRESET / 500 from clone is the most common
          # cold-CI flake when the runner happens to land on a flaky
          # egress). The clone takes <1 s on success; 3 attempts with
          # 5 s/15 s backoff caps the worst case at ~22 s vs. an
          # immediate red run + re-queue.
          rm -rf addons/gut /tmp/gut-src
          attempt=0
          max_attempts=3
          until git clone --depth 1 --branch "${GUT_VERSION}" https://github.com/bitwes/Gut.git /tmp/gut-src; do
            attempt=$((attempt + 1))
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "GUT clone failed after ${max_attempts} attempts" >&2
              exit 1
            fi
            backoff=$((attempt * 10 - 5))   # 5s, 15s
            echo "GUT clone attempt ${attempt} failed; retrying in ${backoff}s..." >&2
            rm -rf /tmp/gut-src
            sleep "${backoff}"
          done
          mkdir -p addons
          mv /tmp/gut-src/addons/gut addons/gut
          ls addons/gut/gut_cmdln.gd

      - name: Verify GUT addon present
        run: |
          set -euo pipefail
          # Defensive — covers both cache-hit and cold-clone paths. If
          # this fails the GUT step would fail anyway with a less-clear
          # error, so the early check just makes diagnosis cheaper.
          test -f addons/gut/gut_cmdln.gd

      # Devon static-analysis gate 2026-05-23 — surface GDScript style/lint
      # findings via gdtoolkit. **Warnings-only for now**: both gdlint and
      # gdformat steps wrap their invocation with `set +e` + an explicit
      # `true` exit so they NEVER fail the workflow. Output is captured to
      # disk and uploaded as an artifact on every run so reviewers can
      # audit the warning surface, but the build stays green regardless of
      # lint volume.
      #
      # Rollout plan (Sponsor-authorised 2026-05-23):
      #   Stage 1 (this PR): warnings-only, surface baseline volume
      #                      (~387 gdlint findings + ~179 gdformat
      #                      reformats as of the dispatching commit).
      #   Stage 2: clean-slate fix-pass tickets filed for the top rule
      #            categories (max-line-length, class-definitions-order,
      #            duplicated-load, max-public-methods, gdformat reformat).
      #   Stage 3: drop the `set +e` / `true` guard and promote to errors
      #            once the warning count is at zero / sustainably bounded.
      #
      # gdtoolkit is a Python package (pip). The barichello/godot-ci
      # container's Dockerfile (verified upstream at
      # https://github.com/abarichello/godot-ci/blob/master/Dockerfile)
      # installs ONLY: ca-certificates git git-lfs unzip wget zip adb
      # openjdk-17-jdk-headless rsync nodejs osslsigncode — NO python3,
      # NO pip. The original PR #333 assumption that the image shipped
      # Python was empirically false (CI run 26326920131 exit 127:
      # `pip: command not found`). Drew's peer-review caught it; this
      # step bootstraps python3 + pip if needed.
      #
      # Bootstrap shape (Drew's fix shape, PR #333 round 2):
      #   1. Probe `python3 -m pip --version` first — fast-path if a
      #      future container revision adds Python via ensurepip.
      #   2. Fall back to `apt-get install -y python3 python3-pip` if
      #      the probe fails. ~10-15s install cost on a cold container.
      #   3. Then `python3 -m pip install --quiet gdtoolkit>=4.3,<5`.
      # Using `python3 -m pip` over bare `pip` is defensive: it works
      # whether pip is symlinked into PATH or only accessible via the
      # python3 module loader.
      #
      # Pin to a known-working version range to avoid surprise rule-set
      # drift on a transitive gdtoolkit release.
      #
      # Step placement: BEFORE `Stamp build SHA` / `Headless import` /
      # `Run GUT tests` so static-analysis findings surface fast and don't
      # wait on the expensive import path. The lint steps add ~15-20 s
      # combined (including bootstrap); well under the 10-minute timeout.
      - name: Install gdtoolkit (gdlint + gdformat)
        run: |
          set -euo pipefail
          # Probe: does python3 + pip already exist? Fast-path return if so.
          if python3 -m pip --version >/dev/null 2>&1; then
            echo "python3 + pip already available — skipping apt bootstrap"
          else
            echo "python3 -m pip probe failed — bootstrapping via apt-get"
            apt-get update
            apt-get install -y --no-install-recommends python3 python3-pip
          fi
          # `--break-system-packages` is needed on Ubuntu noble (PEP 668
          # externally-managed-environment guard); harmless on older
          # Pythons that don't recognise the flag... actually they DO
          # error on unknown flags, so gate it on a probe.
          PIP_BREAK_FLAG=""
          if python3 -m pip install --help 2>&1 | grep -q '\-\-break-system-packages'; then
            PIP_BREAK_FLAG="--break-system-packages"
          fi
          python3 -m pip install --quiet ${PIP_BREAK_FLAG} 'gdtoolkit>=4.3,<5'
          # Sanity: confirm the binaries are on PATH after install.
          gdlint --version
          gdformat --version

      - name: gdlint (warnings-only)
        run: |
          # Intentional: warnings-only mode (Stage 1 of the gdtoolkit
          # rollout — see the "Install gdtoolkit" step above for the
          # staged plan). Output is captured to disk for artifact upload
          # and a summary count is echoed inline so the step log is
          # self-describing without needing to download the artifact.
          mkdir -p lint-reports
          set +e
          # Config: gdlintrc at repo root (committed to make baseline reproducible).
          gdlint scripts/ tests/ > lint-reports/gdlint.txt 2>&1
          gdlint_exit=$?
          set -e
          # gdlint exits non-zero on any finding. The actual finding
          # count is captured by matching the "<path>:<line>: Error:"
          # shape gdlint emits per finding (the trailing
          # "Failure: N problems found" line is gdlint's own summary).
          finding_count=$(grep -cE '^[^[:space:]]+:[0-9]+: Error:' lint-reports/gdlint.txt || true)
          echo "gdlint exit: ${gdlint_exit}   findings: ${finding_count}"
          echo "=== gdlint output (first 40 lines) ==="
          head -n 40 lint-reports/gdlint.txt || true
          echo "=== (truncated; full output in ci-lint-reports artifact) ==="
          # Belt-and-braces: the `set +e` already prevented gdlint's
          # exit code from killing the step, but `true` here makes the
          # warnings-only intent unambiguous in the workflow YAML.
          true

      - name: gdformat --check (warnings-only)
        run: |
          mkdir -p lint-reports
          set +e
          gdformat --check scripts/ tests/ > lint-reports/gdformat.txt 2>&1
          gdformat_exit=$?
          set -e
          # gdformat --check prints "would reformat <path>" per file
          # that needs formatting, plus a final
          # "N files would be reformatted, M files would be left unchanged."
          reformat_count=$(grep -cE '^would reformat ' lint-reports/gdformat.txt || true)
          echo "gdformat exit: ${gdformat_exit}   would-reformat: ${reformat_count}"
          echo "=== gdformat output (first 20 lines) ==="
          head -n 20 lint-reports/gdformat.txt || true
          echo "=== (truncated; full output in ci-lint-reports artifact) ==="
          true

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Always-on (`if: always()`) because the lint artifact is most
          # useful on GREEN runs during the warnings-only rollout — that's
          # when reviewers need to see the residual surface to decide on
          # follow-up fix-pass scope. Once the rules are promoted to
          # errors (Stage 3), this can become `if: failure()` to match
          # the test-artifacts pattern below.
          name: ci-lint-reports-${{ github.run_id }}
          path: lint-reports/
          retention-days: 7
          if-no-files-found: warn

      - name: Stamp build SHA into project
        run: |
          set -euo pipefail
          # Devon hook 1 — write the short git SHA to build_info.txt so the
          # BuildInfo autoload renders it as the "build: abcdef1" footer.
          # Tess m1-test-plan section "Build identification" requires every test
          # run to record the SHA. ${GITHUB_SHA:0:7} is the 7-char short
          # form Git uses by default. The same step lives in release-itch.yml
          # so HTML5 / native exports also stamp the SHA.
          short_sha="${GITHUB_SHA:0:7}"
          echo -n "${short_sha}" > build_info.txt
          echo "Stamped build_info.txt = ${short_sha}"

      - name: Headless import (asset import sanity)
        run: |
          set -euo pipefail
          # `--import` exits 0 if the project loads & all assets import cleanly.
          # `--headless` is required on the CI image (no display).
          # `--quit-after 200` guards against import hangs.
          # On a cache hit the import database is already present and
          # Godot only re-imports anything whose source file changed.
          godot --headless --import --quit-after 200
          # Confirm the import cache materialised.
          test -d .godot

      - name: Run GUT tests
        run: |
          set -euo pipefail
          # `-gexit` makes GUT exit with non-zero on test failures, so the
          # CI step fails accordingly. `-gdir=res://tests` discovers any
          # test_*.gd files. If the tests/ folder has only the .gdkeep file
          # GUT exits 0 with "no tests found" — that's fine for week 1.
          # Devon ci-hardening 2026-05-02 — emit a JUnit XML report
          # (-gjunit_xml_file, GUT v9.3.0+) into ./test-reports/ so failed
          # runs upload structured per-test data. The XML is only useful
          # when tests fail, so it is uploaded conditionally below. Path
          # is pre-created because GUT does not create parent dirs.
          #
          # Drew 2026-05-15 (#86c9u2w6y) — tee the full GUT stdout+stderr
          # into test-reports/gut-output.log. The GUT exit code alone is
          # NOT trustworthy: a test_*.gd file with a GDScript parse error
          # is silently dropped by GUT (Godot's loader returns null, GUT
          # logs a WARNING and skips it) yet GUT still exits 0 — CI goes
          # green while a headline test never ran (PR #194 / Tess QA). The
          # "Gate: GUT parse-failure scan" step below greps this log for
          # the parse-failure signal lines and fails the build if any are
          # present. `2>&1` is required — the "SCRIPT ERROR: Parse Error"
          # and "Failed to load script" lines go to stderr, only GUT's
          # "Ignoring script ..." WARNING goes to stdout.
          mkdir -p test-reports
          godot --headless \
                -s addons/gut/gut_cmdln.gd \
                -gdir=res://tests \
                -ginclude_subdirs \
                -gjunit_xml_file=test-reports/gut-results.xml \
                -gexit 2>&1 | tee test-reports/gut-output.log

      # Drew 2026-05-15 (#86c9u2w6y) — close the "green CI masks a
      # parse-failed test file" hole. GUT silently drops any test_*.gd
      # that fails to compile and STILL exits 0, so the GUT exit code
      # checked by the step above is not a sufficient gate. This step is
      # the real gate: it scans the captured GUT output for the three
      # parse-failure signal lines and fails the build (exit 1) if any
      # appear. Exact strings observed in PR #194's broken run:
      #   SCRIPT ERROR: Parse Error: <detail>            (Godot compiler, stderr)
      #   ERROR: Failed to load script "res://..." with error "Parse error".  (Godot loader, stderr)
      #   [WARNING]: Ignoring script res://... because it does not extend GutTest  (GUT, stdout)
      # The "does not extend GutTest" line also fires for a genuinely
      # non-GutTest script, but every test_*.gd in tests/ DOES extend
      # GutTest (the factories/ helper is not test_*.gd and is not
      # discovered by -gdir), so in this repo that line is unambiguously
      # a parse/load failure signal.
      #
      # Second guard: GUT prints "Scripts   N" in its summary — the count
      # of test scripts it actually loaded. A silently-dropped file shows
      # up as N lower than the number of test_*.gd files on disk. We
      # assert the two match exactly. tests/factories/content_factory.gd
      # is intentionally excluded — it is a helper, not test_*.gd, so GUT
      # never counts it.
      - name: Gate - GUT parse-failure scan
        run: |
          set -euo pipefail
          log=test-reports/gut-output.log
          test -f "$log" || { echo "::error::GUT output log missing — the Run GUT tests step did not produce $log"; exit 1; }

          # --- Guard 1: parse-failure signal lines -------------------------
          # grep -E over the three known signal patterns. grep exits 1 when
          # there are no matches, which is the GREEN path — guard it so
          # `set -e` does not abort on the (expected) no-match case.
          if matches=$(grep -nE 'Parse Error:|Failed to load script .* with error "Parse error"|Ignoring script .* because it does not extend GutTest' "$log"); then
            echo "::error::GUT parse-failure signal detected — a test file failed to compile and was silently skipped. GUT's exit code does not catch this (see #86c9u2w6y)."
            echo "Offending log lines:"
            echo "$matches"
            exit 1
          fi
          echo "OK: no parse-failure signal lines in GUT output."

          # --- Guard 2: loaded-script-count regression ---------------------
          # GUT summary line shape: "Scripts           76"
          # NOTE(86ca65gyv): GUT's "Scripts N" summary EXCLUDES scripts that
          # opt out via `should_skip_script()` (it reports them separately as
          # "[Risky] Script was skipped"). An intentional skip therefore looks
          # identical to a silently-dropped (parse-failed) file from the bare
          # count's perspective. To keep this gate's silent-drop protection
          # intact while tolerating intentional skips, add the skipped-script
          # count back: a parse-dropped file emits NO skip line, so it still
          # trips the mismatch; an intentional skip is accounted for.
          # (Currently: tests/test_cainos_tileset.gd — Cainos 4.6 corner-terrain
          # rebuild deferred, see TODO(86ca65gyv-D) in that file.)
          disk_count=$(find tests -name 'test_*.gd' -type f | wc -l | tr -d ' ')
          gut_count=$(grep -E '^Scripts[[:space:]]+[0-9]+' "$log" | grep -oE '[0-9]+' | tail -n1 || true)
          # Count only the run-summary skip shape ("[Risky] Script was
          # skipped:") — it fires exactly once per intentionally-skipped script.
          # (The inline "[Script skipped]:" line also fires but counting both
          # would double-count.)
          skipped_count=$(grep -cE '\[Risky\] Script was skipped:' "$log" || true)
          if [ -z "$gut_count" ]; then
            echo "::error::Could not find the 'Scripts <N>' summary line in GUT output — GUT may not have run to completion."
            exit 1
          fi
          accounted=$((gut_count + skipped_count))
          echo "Test files on disk (test_*.gd): $disk_count    Scripts loaded by GUT: $gut_count    Skipped: $skipped_count    Accounted: $accounted"
          if [ "$disk_count" -ne "$accounted" ]; then
            echo "::error::Test-script count mismatch: $disk_count test_*.gd files on disk but GUT accounted for $accounted (loaded $gut_count + skipped $skipped_count). A test file was silently dropped (parse error / discovery gap). See #86c9u2w6y."
            exit 1
          fi
          echo "OK: GUT accounted for all $disk_count test files ($gut_count loaded + $skipped_count intentionally skipped)."

      # Devon ci-hardening 2026-05-02 — on a failed run, upload the GUT
      # JUnit XML plus build_info.txt so the next agent (Tess / Devon) can
      # investigate without re-running CI. Always-on upload would consume
      # artifact quota on every green push; the `if: failure()` guard
      # scopes it to red runs where the artifact is actually useful.
      # Retention is short (7 days) — green-and-recent runs do not need
      # post-mortem material; older runs are unrooted from current
      # debugging anyway.
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-artifacts-${{ github.run_id }}
          path: |
            test-reports/
            build_info.txt
          # test-reports/ now also carries gut-output.log (Drew #86c9u2w6y) —
          # the full GUT stdout+stderr capture the parse-failure gate scans.
          # On a red run that log is the fastest way to see which file
          # failed to compile without re-running CI.
          retention-days: 7
          if-no-files-found: ignore
