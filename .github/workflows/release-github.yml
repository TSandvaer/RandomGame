name: Release to GitHub (M1 RC build)

# Secret-free release path. Produces an HTML5 build and either
# - uploads the build directory as a workflow artifact (manual dispatch), or
# - attaches a zip to a GitHub Release (tag push of v*-rc* / v*-m1-*).
#
# Artifact delivery is single-unzip: actions/upload-artifact wraps the
# directory in one zip; Sponsor downloads and unzips once to get the
# runnable HTML5 directory (index.html, .js, .wasm, .pck, etc.).
# A separate zip step runs only on tag pushes for the GitHub Release attach.
#
# This is the M1 sign-off path while itch.io secrets aren't configured.
# Tess and the Sponsor download the artifact from the run / release page.
# Setup checklist for triggering / consumption lives in
#   team/devon-dev/m1-rc-build.md.
#
# Sister workflow .github/workflows/release-itch.yml requires
# BUTLER_API_KEY / ITCH_USER / ITCH_GAME secrets and pushes to itch.io.
# Either workflow can be the source of a Sponsor playtest URL.

on:
  workflow_dispatch:
    inputs:
      release_label:
        description: "Optional label for the artifact (e.g. 'rc1', 'm1-preview'). Affects the artifact name only."
        required: false
        default: "manual"
  push:
    tags:
      - "v*-rc*"
      - "v*-m1-*"
      - "m1-rc*"

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "embergrave"

permissions:
  contents: write   # needed by softprops/action-gh-release on tag pushes

jobs:
  export-html5:
    name: Export HTML5 (Godot 4.3 headless)
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3
    # Match ci.yml — barichello/godot-ci's default `sh -e` shell breaks on
    # `set -o pipefail`. Force bash for every step.
    defaults:
      run:
        shell: bash
    outputs:
      zip_name: ${{ steps.zip.outputs.zip_name }}
      short_sha: ${{ steps.stamp.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show Godot version
        run: godot --version

      - name: Provide export templates
        run: |
          set -euo pipefail
          # barichello/godot-ci pre-installs templates at
          #   /root/.local/share/godot/export_templates/${VERSION}.stable
          # but inside GH Actions, the container runs with HOME=/github/home,
          # so Godot looks for templates under
          #   /github/home/.local/share/godot/...
          # and finds nothing. Copy the pre-installed templates into the
          # runner's HOME, and download as a fallback if the image lacks them.
          GODOT_TEMPLATES_REL="export_templates/${GODOT_VERSION}.stable"
          PREINSTALLED="/root/.local/share/godot/${GODOT_TEMPLATES_REL}"
          RUNNER_HOME="${HOME:-/github/home}"
          TARGET_DIR="${RUNNER_HOME}/.local/share/godot/${GODOT_TEMPLATES_REL}"
          mkdir -p "$(dirname "${TARGET_DIR}")"
          if [ -d "${PREINSTALLED}" ] && [ -n "$(ls -A "${PREINSTALLED}" 2>/dev/null)" ]; then
            # cp -r (don't symlink) — more robust against image layout drift.
            cp -r "${PREINSTALLED}" "${TARGET_DIR}"
            echo "Copied pre-installed templates from ${PREINSTALLED} -> ${TARGET_DIR}"
          else
            mkdir -p "${TARGET_DIR}"
            curl -L -o /tmp/templates.tpz "https://downloads.tuxfamily.org/godotengine/${GODOT_VERSION}/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
            unzip -o /tmp/templates.tpz -d /tmp/
            mv /tmp/templates/* "${TARGET_DIR}/"
            echo "Downloaded templates to ${TARGET_DIR}"
          fi
          ls "${TARGET_DIR}" | head -20

      - name: Stamp build SHA into project
        id: stamp
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          echo -n "${short_sha}" > build_info.txt
          echo "Stamped build_info.txt = ${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Headless import (asset import sanity)
        run: |
          set -euo pipefail
          godot --headless --import --quit-after 200
          test -d .godot

      - name: Verify HTML5 preset present
        run: |
          set -euo pipefail
          # Sanity check: the preset name must match the matrix entry below
          # AND match the [preset.X] name field in export_presets.cfg.
          test -f export_presets.cfg
          grep -q 'name="HTML5"' export_presets.cfg

      - name: Create output dir
        run: mkdir -p build/web

      - name: Export HTML5
        run: |
          set -euo pipefail
          godot --headless --export-release "HTML5" "build/web/index.html"
          ls -la build/web/

      - name: Verify HTML5 output
        run: |
          set -euo pipefail
          # Smoke-check that the four pieces of an HTML5 export landed.
          # Godot 4.3 produces: index.html, index.js, index.wasm, index.pck
          # (or index.audio.position.worklet.js + index.audio.worklet.js for some configs).
          test -f build/web/index.html
          test -f build/web/index.js
          test -f build/web/index.wasm
          test -f build/web/index.pck

      - name: Verify build_info.txt shipped in .pck (BB-1 regression gate)
        run: |
          set -euo pipefail
          # BB-1 / ClickUp 86c9m390b — Tess run-024 found the HTML5 RC's HUD
          # footer always read "build: dev-local" because export_presets.cfg's
          # `export_filter="all_resources"` strips plain .txt files from the
          # .pck, so BuildInfo.gd's `FileAccess.file_exists("res://build_info.txt")`
          # returned false on the shipped artifact. Fix is `include_filter="build_info.txt"`
          # in every preset. This step is the regression gate: assert the
          # 7-char short SHA bytes appear inside `index.pck`. The .pck is a
          # binary archive that stores file paths + raw contents back-to-back;
          # since `build_info.txt` is exactly the 7 SHA bytes, those bytes
          # must be findable via `grep -aF` in the pck. If this fails, the
          # include_filter regressed (or someone re-ran the editor and let
          # Godot rewrite the preset block).
          short_sha="${{ steps.stamp.outputs.short_sha }}"
          if ! grep -aFq "${short_sha}" build/web/index.pck; then
            echo "ERROR: short SHA '${short_sha}' not found in build/web/index.pck" >&2
            echo "BB-1 regressed — build_info.txt is not in the export bundle." >&2
            echo "Check export_presets.cfg HTML5 preset has include_filter=\"build_info.txt\"." >&2
            exit 1
          fi
          # Also assert the literal filename is in the pck's path table —
          # cheaper than a full pack inspection but distinguishes "SHA bytes
          # happen to collide" from "the file is actually packed".
          if ! grep -aFq "build_info.txt" build/web/index.pck; then
            echo "ERROR: 'build_info.txt' filename not found in build/web/index.pck path table" >&2
            exit 1
          fi
          echo "OK: build_info.txt (containing '${short_sha}') is shipped in index.pck"

      - name: Determine release label
        id: label
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            label="${GITHUB_REF_NAME}"
          else
            label="${{ github.event.inputs.release_label }}"
            if [ -z "$label" ]; then
              label="manual"
            fi
          fi
          # Replace forward slashes (rare in tag names but safe).
          label="${label//\//-}"
          echo "label=${label}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (workflow run)
        # Upload the build directory directly — actions/upload-artifact wraps
        # it in one zip on delivery. Sponsor downloads and unzips once to get
        # the runnable HTML5 directory. Artifact name convention unchanged.
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-html5-${{ steps.stamp.outputs.short_sha }}
          path: build/web/
          retention-days: 30
          if-no-files-found: error

      - name: Zip HTML5 build (release attach only)
        # Only needed for tag-push GitHub Release attachment.
        # Manual workflow_dispatch skips this — artifact upload above suffices.
        id: zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          mkdir -p release
          zip_name="${EXPORT_NAME}-html5-${{ steps.stamp.outputs.short_sha }}-${{ steps.label.outputs.label }}.zip"
          (cd build/web && zip -r "../../release/${zip_name}" .)
          ls -la release/
          echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"

      - name: Stage zip for release job
        # Tag pushes also create a Release; persist the zip across jobs.
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: release/${{ steps.zip.outputs.zip_name }}
          retention-days: 1
          if-no-files-found: error

  github-release:
    name: Attach HTML5 zip to GitHub Release
    needs: export-html5
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: release-zip
          path: release/

      - name: List
        run: ls -la release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          # Don't fail re-runs on the same tag.
          fail_on_unmatched_files: true
